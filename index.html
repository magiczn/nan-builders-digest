<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Builders Digest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafafa;
            overflow: hidden;
            touch-action: pan-y;
            height: 100%;
        }

        .container {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .progress {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0,0,0,0.06);
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: #1a1a1a;
            transition: width 0.3s;
            width: 0%;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            will-change: transform;
            transform: translateY(100%);
        }

        .card.active { transform: translateY(0); }
        .card.prev { transform: translateY(-100%); }

        .card.animating,
        .cover-card.animating {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .header {
            height: 60px;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: transparent;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 14px;
            font-weight: 500;
            color: #999;
            letter-spacing: 0.5px;
        }

        .header-date {
            font-size: 13px;
            color: #999;
        }

        .page-number {
            font-size: 13px;
            color: #ccc;
        }

        .content {
            flex: 1;
            padding: 0 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .summary {
            font-size: 20px;
            line-height: 1.8;
            color: #1a1a1a;
            font-weight: 400;
            max-width: 85%;
            width: 100%;
            margin: 0 auto;
            display: -webkit-box;
            -webkit-line-clamp: 8;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
            transition: all 0.3s ease;
        }

        .summary.truncated {
            cursor: pointer;
        }

        .summary.expanded {
            -webkit-line-clamp: unset;
        }

        .summary .expand-hint {
            color: #999;
            font-size: 14px;
            margin-left: 4px;
            cursor: pointer;
        }

        .summary.expanded .expand-hint {
            display: none;
        }

        .summary-title {
            font-size: 15px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 16px;
        }

        .analysis-shell {
            width: 100%;
            max-width: 85%;
            margin: 28px auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .analysis-toggle {
            border: 0;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.06);
            color: #1a1a1a;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .analysis-toggle:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .analysis-shell.revealed .analysis-toggle {
            display: none;
        }

        .analysis-panel {
            width: 100%;
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .analysis-shell.revealed .analysis-panel {
            grid-template-rows: 1fr;
        }

        .analysis-panel-inner {
            min-height: 0;
            overflow: hidden;
        }

        .analysis {
            font-size: 14px;
            line-height: 1.85;
            color: #5f5f5f;
            width: 100%;
            margin: 0;
            padding-top: 18px;
            border-top: 1px solid #ececec;
            text-align: left;
        }

        .card-date {
            font-size: 13px;
            color: #999;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .footer {
            padding: 16px 40px 20px;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            gap: 6px;
        }

        .source {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .source-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .source-info { text-align: left; }

        .source-name {
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-verified {
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 7px;
            font-weight: 700;
        }

        .source-handle {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .source-role {
            font-size: 12px;
            color: #999;
            text-align: center;
            max-width: 85%;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
            line-height: 1.5;
        }

        .view-original {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #666;
            text-decoration: none;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.04);
            border-radius: 16px;
            transition: all 0.2s;
        }

        .view-original:hover {
            background: rgba(0,0,0,0.08);
            color: #1a1a1a;
        }

        .view-original svg {
            width: 12px;
            height: 12px;
        }

        /* 首页样式 */
        .cover-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            will-change: transform;
            transform: translateY(100%);
            padding: 40px 20px;
        }

        .cover-top {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cover-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        .cover-card.active { transform: translateY(0); }
        .cover-card.prev { transform: translateY(-100%); }

        .cover-logo {
            width: 64px;
            height: 64px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
        }

        .cover-date {
            font-size: 14px;
            color: #999;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .cover-title {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .cover-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 18px;
            line-height: 1.6;
            max-width: 420px;
        }

        .cover-stats {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 18px;
            border: 1px solid #e6e6e6;
            border-radius: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #f6f6f6 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 48px;
            text-align: center;
        }

        .cover-stats-label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #999;
            line-height: 1;
        }

        .cover-stats-text {
            font-size: 20px;
            line-height: 1.2;
            color: #1a1a1a;
            font-weight: 600;
        }

        .cover-stats-text strong {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .cover-meta {
            font-size: 13px;
            color: #999;
            line-height: 1;
            display: flex;
            gap: 32px;
        }

        .cover-meta span {
            color: #666;
        }

        .cover-arrow {
            margin-top: 48px;
            color: #1a1a1a;
            animation: bounce 1.5s ease-in-out infinite;
        }

        .cover-arrow svg {
            width: 24px;
            height: 24px;
            transform: rotate(-90deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-8px); opacity: 0.6; }
        }

        .swipe-hint {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #1a1a1a;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 1px;
        }

        .swipe-hint.show { opacity: 1; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #1a1a1a;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="header">
            <span class="header-date" id="headerDate">2025年1月15日</span>
            <span class="header-title">AI Builders Digest</span>
            <span class="page-number" id="pageNumber">1</span>
        </div>

        <div id="cardStack"></div>

        <div class="swipe-hint" id="swipeHint">上滑显示更多</div>
        <div class="toast" id="toast">今天就这些了</div>
    </div>

    <script>
        let buildersData = [];
        let currentIndex = -1; // -1 表示首页
        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        let velocity = 0;
        let lastY = 0;
        let lastTime = 0;
        let animationId = null;

        async function loadData() {
            try {
                const response = await fetch('data.json');
                buildersData = await response.json();
                init();
            } catch (error) {
                console.log('Fetch failed, trying alternative method...');
                loadDataWithXHR();
            }
        }

        function loadDataWithXHR() {
            const xhr = new XMLHttpRequest();
            xhr.overrideMimeType('application/json');
            xhr.open('GET', 'data.json', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 || xhr.status === 0) {
                        try {
                            buildersData = JSON.parse(xhr.responseText);
                            init();
                        } catch (e) {
                            console.error('Failed to parse data:', e);
                            showError();
                        }
                    } else {
                        console.error('Failed to load data.json');
                        showError();
                    }
                }
            };
            xhr.send(null);
        }

        function showError() {
            document.getElementById('cardStack').innerHTML = '<div style="padding: 40px; text-align: center; color: #666;">加载数据失败，请刷新重试<br><small>如果是本地打开，请使用本地服务器：python3 -m http.server 8000</small></div>';
        }

        function init() {
            // 设置日期（年月日）
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('headerDate').textContent = dateStr;

            renderCards();
            bindEvents();
            updateUI();
        }

        function renderCards() {
            const stack = document.getElementById('cardStack');
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.');
            const fullDateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            const sourcePosts = buildersData.filter((builder) => !builder.isSummary);
            const builderCount = new Set(sourcePosts.map((builder) => builder.handle)).size;
            const postCount = sourcePosts.length;

            // 首页
            let html = `
                <div class="cover-card active" data-index="-1">
                    <div class="cover-top">
                        <div class="cover-logo">AI</div>
                        <div class="cover-date">${fullDateStr}</div>
                        <div class="cover-title">Builders Daily</div>
                        <div class="cover-desc">聚焦 X.com 上面卓越 AI Builders 的动态与洞见。</div>
                        <div class="cover-stats">
                            <div class="cover-stats-label">Today's Pulse</div>
                            <div class="cover-stats-text">追踪到 <strong>${builderCount}</strong> 位 Builders 的 <strong>${postCount}</strong> 条动态</div>
                        </div>
                        <div class="cover-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </div>
                    <div class="cover-bottom">
                        <div class="cover-meta">
                            <div>出品：<span>红心大狼狗</span></div>
                            <div>致谢：<span>张咋啦</span></div>
                        </div>
                    </div>
                </div>
            `;

            // 内容页
            html += buildersData.map((builder, index) => `
                <div class="card" data-index="${index}">
                    <div class="content">
                        <div class="card-date">${dateStr}</div>
                        ${builder.isSummary ? '<div class="summary-title">今日小结</div>' : ''}
                        <div class="summary" data-full="${builder.summaryEn.replace(/"/g, '&quot;')}">${builder.summaryEn}</div>
                        ${builder.analysis ? `
                            <div class="analysis-shell">
                                <button type="button" class="analysis-toggle">AI 解读</button>
                                <div class="analysis-panel">
                                    <div class="analysis-panel-inner">
                                        <div class="analysis">${builder.analysis}</div>
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    <div class="footer">
                        <div class="source">
                            <div class="source-avatar">${builder.avatar}</div>
                            <div class="source-info">
                                <div class="source-name">
                                    ${builder.name}
                                    ${builder.verified ? '<span class="source-verified">V</span>' : ''}
                                </div>
                                ${builder.isSummary ? '' : `<div class="source-handle">@${builder.handle}</div>`}
                            </div>
                        </div>
                        <div class="source-role">${builder.role}</div>
                        ${builder.url ? `<a href="${builder.url}" target="_blank" class="view-original">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                            查看原文
                        </a>` : ''}
                    </div>
                </div>
            `).join('');

            stack.innerHTML = html;

            // 检查哪些文本需要展开提示
            setTimeout(() => {
                document.querySelectorAll('.summary').forEach(el => {
                    if (el.scrollHeight > el.clientHeight + 5) {
                        el.classList.add('truncated');
                        const hint = document.createElement('span');
                        hint.className = 'expand-hint';
                        hint.textContent = '展开';
                        el.appendChild(hint);
                    }
                });
            }, 100);
        }

        function bindEvents() {
            const container = document.getElementById('container');

            container.addEventListener('touchstart', handleStart, { passive: true });
            container.addEventListener('touchmove', handleMove, { passive: false });
            container.addEventListener('touchend', handleEnd);

            container.addEventListener('mousedown', handleStart);
            container.addEventListener('mousemove', handleMove);
            container.addEventListener('mouseup', handleEnd);
            container.addEventListener('mouseleave', handleEnd);

            let wheelTimeout;
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                clearTimeout(wheelTimeout);
                wheelTimeout = setTimeout(() => {
                    if (e.deltaY > 0 && currentIndex === buildersData.length - 1) {
                        showToast();
                    } else if (e.deltaY < 0 && currentIndex === -1) {
                        // 首页继续向上滑，不做任何事
                    } else {
                        goTo(currentIndex + (e.deltaY > 0 ? 1 : -1));
                    }
                }, 50);
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === ' ') {
                    e.preventDefault();
                    if (currentIndex === buildersData.length - 1) {
                        showToast();
                    } else {
                        goTo(currentIndex + 1);
                    }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentIndex > -1) {
                        goTo(currentIndex - 1);
                    }
                }
            });

            // 点击展开/收起文本
            document.addEventListener('click', (e) => {
                const target = e.target;

                if (target.closest('.analysis-toggle')) {
                    const shell = target.closest('.analysis-shell');
                    if (shell) {
                        shell.classList.add('revealed');
                    }
                    e.stopPropagation();
                    return;
                }

                // 点击展开提示
                if (target.classList.contains('expand-hint')) {
                    const parent = target.parentElement;
                    parent.classList.add('expanded');
                    e.stopPropagation();
                    return;
                }

                // 点击被截断的文本区域
                if (target.classList.contains('truncated')) {
                    target.classList.add('expanded');
                }
            });
        }

        function handleStart(e) {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.analysis-toggle')) return; // 忽略链接和按钮点击
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            currentY = startY;
            lastY = startY;
            lastTime = Date.now();
            velocity = 0;
            isDragging = true;
            cancelAnimationFrame(animationId);

            // 移除动画类，准备跟随手指
            document.querySelectorAll('.card, .cover-card').forEach(el => {
                el.classList.remove('animating');
            });
        }

        function handleMove(e) {
            if (!isDragging) return;
            if (e.preventDefault) e.preventDefault();

            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const now = Date.now();
            const dt = now - lastTime;

            // 计算速度
            if (dt > 0) {
                velocity = (lastY - y) / dt * 16; // 归一化到 16ms 帧间隔
            }
            lastY = y;
            lastTime = now;

            const diff = startY - y;
            currentY = y;

            // 实时移动卡片
            updateCardPositions(diff);
        }

        function updateCardPositions(diff) {
            const vh = window.innerHeight;
            const coverCard = document.querySelector('.cover-card');
            const cards = document.querySelectorAll('.card');

            // 边界弹性效果
            let rubberDiff = diff;
            if (diff < 0 && currentIndex === -1) {
                // 首页向下拉，弹性阻力
                rubberDiff = diff * 0.3;
            } else if (diff > 0 && currentIndex === buildersData.length - 1) {
                // 最后一页向上拉，弹性阻力
                rubberDiff = diff * 0.3;
            }

            if (currentIndex === -1) {
                // 在首页
                if (coverCard) {
                    coverCard.style.transform = `translateY(${-rubberDiff}px)`;
                }
                if (cards[0]) {
                    cards[0].style.transform = `translateY(calc(100% - ${rubberDiff}px))`;
                }
            } else {
                // 在内容页
                if (coverCard) {
                    coverCard.style.transform = `translateY(calc(-100% - ${rubberDiff}px))`;
                }
                cards.forEach((card, i) => {
                    if (i < currentIndex) {
                        card.style.transform = `translateY(calc(-100% - ${rubberDiff}px))`;
                    } else if (i === currentIndex) {
                        card.style.transform = `translateY(${-rubberDiff}px)`;
                    } else if (i === currentIndex + 1) {
                        card.style.transform = `translateY(calc(100% - ${rubberDiff}px))`;
                    }
                });
            }
        }

        function handleEnd(e) {
            if (!isDragging) return;
            isDragging = false;

            const diff = startY - currentY;
            const absDiff = Math.abs(diff);

            // 添加动画类
            document.querySelectorAll('.card, .cover-card').forEach(el => {
                el.classList.add('animating');
            });

            // 判断是否切换：基于滑动距离或速度
            const shouldSwitch = absDiff > 60 || (Math.abs(velocity) > 8 && absDiff > 20);

            if (shouldSwitch) {
                // 向上滑动（diff > 0）
                if (diff > 0 && currentIndex === buildersData.length - 1) {
                    // 在最后一页继续向上滑动，显示 toast 并回弹
                    resetCardPositions();
                    showToast();
                } else if (diff < 0 && currentIndex === -1) {
                    // 首页向下滑动，回弹
                    resetCardPositions();
                } else {
                    goTo(currentIndex + (diff > 0 ? 1 : -1));
                }
            } else {
                // 回弹到原位
                resetCardPositions();
            }
        }

        function resetCardPositions() {
            // 清除内联 transform 样式，让 CSS 类接管
            const coverCard = document.querySelector('.cover-card');
            const cards = document.querySelectorAll('.card');

            if (coverCard) {
                coverCard.style.transform = '';
            }
            cards.forEach(card => {
                card.style.transform = '';
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function goTo(index) {
            // -1 是首页，0 到 buildersData.length-1 是内容页
            if (index < -1 || index >= buildersData.length) return;

            currentIndex = index;

            // 清除内联样式
            resetCardPositions();

            // 更新首页类名
            const coverCard = document.querySelector('.cover-card');
            if (coverCard) {
                coverCard.className = 'cover-card animating';
                if (currentIndex === -1) coverCard.classList.add('active');
                else coverCard.classList.add('prev');
            }

            // 更新内容卡片类名
            document.querySelectorAll('.card').forEach((card, i) => {
                card.className = 'card animating';
                if (i === currentIndex) card.classList.add('active');
                else if (i < currentIndex) card.classList.add('prev');
            });

            updateUI();
        }

        function updateUI() {
            // 首页时进度为0，内容页从1开始计算
            const total = buildersData.length + 1; // 包含首页
            const current = currentIndex + 1; // -1 变成 0，0 变成 1
            const progress = (current / total) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            // 页码：首页不显示，内容页从1开始
            if (currentIndex === -1) {
                document.getElementById('pageNumber').textContent = '';
            } else {
                document.getElementById('pageNumber').textContent = currentIndex + 1;
            }
        }

        loadData();
    </script>
</body>
</html>
