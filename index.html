<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Builders Digest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #000;
            overflow: hidden;
            touch-action: pan-y;
            height: 100%;
        }

        .container {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .progress {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            width: 0%;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }

        .card.active { transform: translateY(0); }
        .card.prev { transform: translateY(-100%); }

        .header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .header-date {
            position: absolute;
            right: 20px;
            font-size: 13px;
            color: #999;
        }

        .content {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .builder-info {
            margin-bottom: 24px;
        }

        .builder-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .builder-role {
            font-size: 15px;
            color: #666;
        }

        .summary {
            font-size: 20px;
            line-height: 1.75;
            color: #1a1a1a;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .summary-en {
            font-size: 15px;
            line-height: 1.65;
            color: #666;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .footer {
            padding: 16px 20px 30px;
            background: #fff;
            border-top: 1px solid #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .source {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .source-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .source-info { min-width: 0; }

        .source-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-verified {
            width: 14px;
            height: 14px;
            background: #ff6b6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 8px;
            font-weight: 700;
        }

        .source-handle {
            font-size: 13px;
            color: #999;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .read-more {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: #f5f5f5;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            font-size: 13px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .read-more svg {
            width: 14px;
            height: 14px;
        }

        .swipe-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .swipe-hint.show { opacity: 1; }

        .page-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="header">
            <span class="header-title">AI Builders Digest</span>
            <span class="header-date" id="currentDate"></span>
        </div>

        <div id="cardStack"></div>

        <div class="swipe-hint" id="swipeHint">上滑查看更多</div>
        <div class="page-indicator" id="pageIndicator">1 / 10</div>
    </div>

    <script>
        let buildersData = [];
        let currentIndex = 0;
        let startY = 0;
        let isDragging = false;

        async function loadData() {
            try {
                const response = await fetch('data.json');
                buildersData = await response.json();
                init();
            } catch (error) {
                console.error('Failed to load data:', error);
                document.getElementById('cardStack').innerHTML = '<div style="padding: 40px; text-align: center;">加载数据失败，请刷新重试</div>';
            }
        }

        function init() {
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
            renderCards();
            bindEvents();
            updateUI();
        }

        function renderCards() {
            const stack = document.getElementById('cardStack');
            stack.innerHTML = buildersData.map((builder, index) => `
                <div class="card ${index === 0 ? 'active' : ''}" data-index="${index}">
                    <div class="content">
                        <div class="builder-info">
                            <div class="builder-name">${builder.name}</div>
                            <div class="builder-role">${builder.role}</div>
                        </div>
                        <div class="summary">${builder.summary}</div>
                        <div class="summary-en">${builder.summaryEn}</div>
                    </div>
                    <div class="footer">
                        <div class="source">
                            <div class="source-avatar">${builder.avatar}</div>
                            <div class="source-info">
                                <div class="source-name">
                                    ${builder.name}
                                    ${builder.verified ? '<span class="source-verified">V</span>' : ''}
                                </div>
                                <div class="source-handle">@${builder.handle}</div>
                            </div>
                        </div>
                        <a href="${builder.url}" target="_blank" class="read-more" onclick="event.stopPropagation()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                <polyline points="15,3 21,3 21,9"/>
                                <line x1="10" y1="14" x2="21" y2="3"/>
                            </svg>
                            阅读原文
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function bindEvents() {
            const container = document.getElementById('container');

            container.addEventListener('touchstart', handleStart, { passive: true });
            container.addEventListener('touchmove', handleMove, { passive: false });
            container.addEventListener('touchend', handleEnd);

            container.addEventListener('mousedown', handleStart);
            container.addEventListener('mousemove', handleMove);
            container.addEventListener('mouseup', handleEnd);
            container.addEventListener('mouseleave', () => isDragging = false);

            let wheelTimeout;
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                clearTimeout(wheelTimeout);
                wheelTimeout = setTimeout(() => {
                    goTo(currentIndex + (e.deltaY > 0 ? 1 : -1));
                }, 100);
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === ' ') {
                    e.preventDefault();
                    goTo(currentIndex + 1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    goTo(currentIndex - 1);
                }
            });
        }

        function handleStart(e) {
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            isDragging = true;
        }

        function handleMove(e) {
            if (!isDragging) return;
            if (e.preventDefault) e.preventDefault();
        }

        function handleEnd(e) {
            if (!isDragging) return;
            isDragging = false;

            const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const diff = startY - endY;

            if (Math.abs(diff) > 50) {
                goTo(currentIndex + (diff > 0 ? 1 : -1));
            }
        }

        function goTo(index) {
            if (index < 0 || index >= buildersData.length) return;

            currentIndex = index;

            document.querySelectorAll('.card').forEach((card, i) => {
                card.className = 'card';
                if (i === currentIndex) card.classList.add('active');
                else if (i < currentIndex) card.classList.add('prev');
            });

            updateUI();

            if (currentIndex < buildersData.length - 1) {
                const hint = document.getElementById('swipeHint');
                hint.classList.add('show');
                setTimeout(() => hint.classList.remove('show'), 1500);
            }
        }

        function updateUI() {
            const progress = ((currentIndex + 1) / buildersData.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('pageIndicator').textContent = `${currentIndex + 1} / ${buildersData.length}`;
        }

        loadData();
    </script>
</body>
</html>
