        function hasActiveTextSelection() {
            const selection = window.getSelection?.();
            return Boolean(selection && String(selection).trim().length > 0);
        }

        function isSelectableTextTarget(target) {
            if (!target || typeof target.closest !== 'function') {
                return false;
            }

            return Boolean(target.closest('.summary, .source-role-top, .source-role'));
        }

        function abortDrag() {
            if (dragActivated) {
                resetCardPositions();
            }

            isDragging = false;
            dragActivated = false;
            startedOnSelectableText = false;
        }

        function handleStart(e) {
            if (
                document.getElementById('previewModal').classList.contains('open') ||
                document.getElementById('exportModal').classList.contains('open') ||
                document.getElementById('confirmModal').classList.contains('open') ||
                document.getElementById('readerModal').classList.contains('open') ||
                e.target.tagName === 'A' ||
                e.target.tagName === 'BUTTON' ||
                e.target.closest('.analysis-toggle') ||
                e.target.closest('.preview-dialog') ||
                e.target.closest('.reader-dialog') ||
                e.target.closest('.export-dialog') ||
                e.target.closest('.confirm-dialog')
            ) return;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            currentY = startY;
            lastY = startY;
            lastTime = Date.now();
            velocity = 0;
            isDragging = true;
            dragActivated = false;
            startedOnSelectableText = isSelectableTextTarget(e.target);
        }

        function handleMove(e) {
            if (!isDragging) return;

            if (hasActiveTextSelection()) {
                abortDrag();
                return;
            }

            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const now = Date.now();
            const dt = now - lastTime;
            const diff = startY - y;
            const absDiff = Math.abs(diff);
            const activationDistance = startedOnSelectableText
                ? TEXT_SELECTION_ACTIVATION_DISTANCE
                : SWIPE_ACTIVATION_DISTANCE;

            if (!dragActivated) {
                if (absDiff < activationDistance) {
                    currentY = y;
                    lastY = y;
                    lastTime = now;
                    return;
                }

                dragActivated = true;
                cancelAnimationFrame(animationId);

                // 只有确认是翻页手势后，才接管页面动画
                document.querySelectorAll('.card, .cover-card').forEach(el => {
                    el.classList.remove('animating');
                });
            }

            if (e.preventDefault) e.preventDefault();

            // 计算速度
            if (dt > 0) {
                velocity = (lastY - y) / dt * 16; // 归一化到 16ms 帧间隔
            }
            lastY = y;
            lastTime = now;
            currentY = y;

            // 实时移动卡片
            updateCardPositions(diff);
        }

        function updateCardPositions(diff) {
            const vh = window.innerHeight;
            const coverCard = document.querySelector('.cover-card');
            const cards = document.querySelectorAll('.card');

            // 边界弹性效果
            let rubberDiff = diff;
            if (diff < 0 && currentIndex === -1) {
                // 首页向下拉，弹性阻力
                rubberDiff = diff * 0.3;
            } else if (diff > 0 && currentIndex === buildersData.length - 1) {
                // 最后一页向上拉，弹性阻力
                rubberDiff = diff * 0.3;
            }

            if (currentIndex === -1) {
                // 在首页
                if (coverCard) {
                    coverCard.style.transform = `translateY(${-rubberDiff}px)`;
                }
                if (cards[0]) {
                    cards[0].style.transform = `translateY(calc(100% - ${rubberDiff}px))`;
                }
            } else {
                // 在内容页
                if (coverCard) {
                    coverCard.style.transform = `translateY(calc(-100% - ${rubberDiff}px))`;
                }
                cards.forEach((card, i) => {
                    if (i < currentIndex) {
                        card.style.transform = `translateY(calc(-100% - ${rubberDiff}px))`;
                    } else if (i === currentIndex) {
                        card.style.transform = `translateY(${-rubberDiff}px)`;
                    } else if (i === currentIndex + 1) {
                        card.style.transform = `translateY(calc(100% - ${rubberDiff}px))`;
                    }
                });
            }
        }

        function handleEnd(e) {
            if (!isDragging) return;
            const wasDragActivated = dragActivated;
            isDragging = false;
            dragActivated = false;
            startedOnSelectableText = false;

            if (!wasDragActivated) {
                return;
            }

            const diff = startY - currentY;
            const absDiff = Math.abs(diff);

            // 添加动画类
            document.querySelectorAll('.card, .cover-card').forEach(el => {
                el.classList.add('animating');
            });

            // 判断是否切换：基于滑动距离或速度
            const shouldSwitch = absDiff > 60 || (Math.abs(velocity) > 8 && absDiff > 20);

            if (shouldSwitch) {
                // 向上滑动（diff > 0）
                if (diff > 0 && currentIndex === buildersData.length - 1) {
                    // 在最后一页继续向上滑动，显示 toast 并回弹
                    resetCardPositions();
                    showToast();
                } else if (diff < 0 && currentIndex === -1) {
                    // 首页向下滑动，回弹
                    resetCardPositions();
                } else {
                    goTo(currentIndex + (diff > 0 ? 1 : -1));
                }
            } else {
                // 回弹到原位
                resetCardPositions();
            }
        }

        function resetCardPositions() {
            // 清除内联 transform 样式，让 CSS 类接管
            const coverCard = document.querySelector('.cover-card');
            const cards = document.querySelectorAll('.card');

            if (coverCard) {
                coverCard.style.transform = '';
            }
            cards.forEach(card => {
                card.style.transform = '';
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function goTo(index) {
            // -1 是首页，0 到 buildersData.length-1 是内容页
            if (index < -1 || index >= buildersData.length) return;

            currentIndex = index;

            document.querySelectorAll('.card-main.reading-mode').forEach((element) => {
                element.classList.remove('reading-mode');
            });

            // 清除内联样式
            resetCardPositions();

            // 更新首页类名
            const coverCard = document.querySelector('.cover-card');
            if (coverCard) {
                coverCard.className = 'cover-card animating';
                if (currentIndex === -1) coverCard.classList.add('active');
                else coverCard.classList.add('prev');
            }

            // 更新内容卡片类名
            document.querySelectorAll('.card').forEach((card, i) => {
                card.className = 'card animating';
                if (i === currentIndex) card.classList.add('active');
                else if (i < currentIndex) card.classList.add('prev');
            });

            updateUI();
        }

        function updateUI() {
            // 首页时进度为0，内容页从1开始计算
            const total = buildersData.length + 1; // 包含首页
            const current = currentIndex + 1; // -1 变成 0，0 变成 1
            const progress = (current / total) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            // 页码：首页不显示，内容页从1开始
            if (currentIndex === -1) {
                document.getElementById('pageNumber').textContent = '';
            } else {
                document.getElementById('pageNumber').textContent = currentIndex + 1;
            }
        }

        loadData();
    </script>
</body>
</html>
