<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Builders Digest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #fafafa;
            overflow: hidden;
            touch-action: pan-y;
            height: 100%;
        }

        .container {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .progress {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0,0,0,0.06);
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: #1a1a1a;
            transition: width 0.3s;
            width: 0%;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateY(100%);
        }

        .card.active { transform: translateY(0); }
        .card.prev { transform: translateY(-100%); }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            background: transparent;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 14px;
            font-weight: 500;
            color: #999;
            letter-spacing: 0.5px;
        }

        .header-date {
            position: absolute;
            right: 24px;
            font-size: 13px;
            color: #ccc;
        }

        .content {
            flex: 1;
            padding: 0 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            max-height: 60vh;
            margin: auto 0;
        }

        .summary {
            font-size: 22px;
            line-height: 1.8;
            color: #1a1a1a;
            font-weight: 400;
            max-width: 80%;
            width: 100%;
            margin: 0 auto;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #e8e8e8;
            margin: 24px auto;
            flex-shrink: 0;
        }

        .builder-meta {
            font-size: 13px;
            color: #999;
            line-height: 1.6;
            max-width: 80%;
            width: 100%;
            margin: 0 auto;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer {
            padding: 24px 40px 20px;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            gap: 16px;
        }

        .source {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .source-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .source-info { text-align: left; }

        .source-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-verified {
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 7px;
            font-weight: 700;
        }

        .source-handle {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .read-more {
            display: none;
        }

        .swipe-hint {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #999;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 1px;
        }

        .swipe-hint.show { opacity: 1; }

        .page-indicator {
            color: #ccc;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="header">
            <span class="header-title">AI Builders Digest</span>
            <span class="header-date" id="currentDate"></span>
        </div>

        <div id="cardStack"></div>

        <div class="swipe-hint" id="swipeHint">上滑阅读下一条</div>
    </div>

    <script>
        let buildersData = [];
        let currentIndex = 0;
        let startY = 0;
        let isDragging = false;

        async function loadData() {
            try {
                // 尝试使用 fetch 加载数据（适用于服务器环境）
                const response = await fetch('data.json');
                buildersData = await response.json();
                init();
            } catch (error) {
                console.log('Fetch failed, trying alternative method...');
                // 本地文件协议下使用 XMLHttpRequest
                loadDataWithXHR();
            }
        }

        function loadDataWithXHR() {
            const xhr = new XMLHttpRequest();
            xhr.overrideMimeType('application/json');
            xhr.open('GET', 'data.json', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 || xhr.status === 0) { // status 0 for local files
                        try {
                            buildersData = JSON.parse(xhr.responseText);
                            init();
                        } catch (e) {
                            console.error('Failed to parse data:', e);
                            showError();
                        }
                    } else {
                        console.error('Failed to load data.json');
                        showError();
                    }
                }
            };
            xhr.send(null);
        }

        function showError() {
            document.getElementById('cardStack').innerHTML = '<div style="padding: 40px; text-align: center; color: #666;">加载数据失败，请刷新重试<br><small>如果是本地打开，请使用本地服务器：python3 -m http.server 8000</small></div>';
        }

        function init() {
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
            renderCards();
            bindEvents();
            updateUI();

            // 首次显示提示
            if (buildersData.length > 1) {
                const hint = document.getElementById('swipeHint');
                hint.classList.add('show');
                setTimeout(() => hint.classList.remove('show'), 2000);
            }
        }

        function renderCards() {
            const stack = document.getElementById('cardStack');
            stack.innerHTML = buildersData.map((builder, index) => `
                <div class="card ${index === 0 ? 'active' : ''}" data-index="${index}">
                    <div class="content">
                        <div class="summary">${builder.summaryEn}</div>
                        <div class="divider"></div>
                        <div class="builder-meta">${builder.role}</div>
                    </div>
                    <div class="footer">
                        <div class="source">
                            <div class="source-avatar">${builder.avatar}</div>
                            <div class="source-info">
                                <div class="source-name">
                                    ${builder.name}
                                    ${builder.verified ? '<span class="source-verified">V</span>' : ''}
                                </div>
                                <div class="source-handle">@${builder.handle}</div>
                            </div>
                        </div>
                        <div class="page-indicator">${index + 1} / ${buildersData.length}</div>
                    </div>
                </div>
            `).join('');
        }

        function bindEvents() {
            const container = document.getElementById('container');

            container.addEventListener('touchstart', handleStart, { passive: true });
            container.addEventListener('touchmove', handleMove, { passive: false });
            container.addEventListener('touchend', handleEnd);

            container.addEventListener('mousedown', handleStart);
            container.addEventListener('mousemove', handleMove);
            container.addEventListener('mouseup', handleEnd);
            container.addEventListener('mouseleave', () => isDragging = false);

            let wheelTimeout;
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                clearTimeout(wheelTimeout);
                wheelTimeout = setTimeout(() => {
                    goTo(currentIndex + (e.deltaY > 0 ? 1 : -1));
                }, 100);
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === ' ') {
                    e.preventDefault();
                    goTo(currentIndex + 1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    goTo(currentIndex - 1);
                }
            });
        }

        function handleStart(e) {
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            isDragging = true;
        }

        function handleMove(e) {
            if (!isDragging) return;
            if (e.preventDefault) e.preventDefault();
        }

        function handleEnd(e) {
            if (!isDragging) return;
            isDragging = false;

            const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const diff = startY - endY;

            if (Math.abs(diff) > 50) {
                goTo(currentIndex + (diff > 0 ? 1 : -1));
            }
        }

        function goTo(index) {
            if (index < 0 || index >= buildersData.length) return;

            currentIndex = index;

            document.querySelectorAll('.card').forEach((card, i) => {
                card.className = 'card';
                if (i === currentIndex) card.classList.add('active');
                else if (i < currentIndex) card.classList.add('prev');
            });

            updateUI();
        }

        function updateUI() {
            const progress = ((currentIndex + 1) / buildersData.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        loadData();
    </script>
</body>
</html>
